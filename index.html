    // ========== 游戏状态 ==========
    let scores = new Array(16).fill(0);
    let cur = 0;

    // 首页
    function renderHome() {
        document.getElementById('app').innerHTML = `
            <h1>ANIME SOUL</h1>
            <p class="subtitle">动漫人格心理测试</p>
            <h2>你的灵魂是哪位动漫角色？</h2>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 25px; line-height: 1.6;">
                回答30道心理测试题<br>
                测测你的灵魂藏着哪位动漫人物
            </p>
            <button onclick="startQuiz()">开始测试</button>
            <p style="font-size: 0.75rem; color: #999; margin-top: 20px;">共30题 · 约需3分钟</p>
        `;
    }

    // 开始答题
    function startQuiz() {
        scores = new Array(16).fill(0);
        cur = 0;
        renderQuiz();
    }

    // 渲染题目
    function renderQuiz() {
        const q = questions[cur];
        document.getElementById('app').innerHTML = `
            <p class="progress">进度: ${cur + 1}/${questions.length}</p>
            <h2 class="question-text">${q.q}</h2>
            ${q.opts.map((o, i) => `<button onclick="next(${i})">${o.t}</button>`).join('')}
        `;
    }

    // 下一题
    function next(idx) {
        questions[cur].opts[idx].s.forEach((v, i) => scores[i] += v);
        cur++;
        if (cur < questions.length) {
            renderQuiz();
        } else {
            renderLoading();
        }
    }

    // 加载页
    function renderLoading() {
        document.getElementById('app').innerHTML = `
            <h2>正在匹配你的动漫人格</h2>
            <div class="loading-dots">
                <span>●</span><span>●</span><span>●</span>
            </div>
            <p style="font-size: 0.85rem; color: #666;">分析你的16维人格数据中...</p>
        `;
        setTimeout(calcResult, 1500);
    }

    // 计算匹配结果
    function calcResult() {
        const results = characters.map(c => {
            let dist = 0;
            for (let i = 0; i < 16; i++) {
                dist += Math.pow(c.dims[i] - scores[i], 2);
            }
            return { ...c, dist };
        }).sort((a, b) => a.dist - b.dist);

        renderResult(results);
    }

    // 渲染结果页
    function renderResult(results) {
        const best = results[0];
        
        // 关键词标签
        const keywordTags = best.keywords.split(/[、,，]/).filter(k => k.trim()).map(k => 
            `<span class="keyword-tag">${k.trim()}</span>`
        ).join('');

        // 行为特征
        const behaviorsHtml = best.behaviors.filter(b => b).map(b => 
            `<div class="behavior-item">${b}</div>`
        ).join('');

        // 16维数据
        const dimsHtml = DIM_NAMES.map((name, i) => 
            `<div class="dim-item"><span>${name}</span><span>${best.dims[i]}</span></div>`
        ).join('');

        document.getElementById('app').innerHTML = `
            <h2>你的动漫人格是</h2>
            <img class="char-img" src="${best.imgSrc}" alt="${best.name}" onerror="this.style.display='none'">
            <div class="character-name">${best.name}</div>
            <div class="character-tag">${best.tag}</div>
            <p class="anime-name">出自：${best.anime}</p>
            
            <div class="soul-quote">"${best.soulQuote}"</div>
            
            <h3>核心关键词</h3>
            <div class="keywords">${keywordTags}</div>
            
            <h3>人格解析</h3>
            <div class="analysis">${best.analysis}</div>
            
            <h3>行为特征</h3>
            <div class="behaviors">${behaviorsHtml}</div>
            
            <h3>16维人格数据</h3>
            <div class="dims">${dimsHtml}</div>
            
            <button onclick="renderHome()" style="margin-top: 20px;">重新测试</button>
        `;
    }

    // 初始化
    window.onload = function() {
        renderHome();
    };
